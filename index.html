<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Redirection</title></head><body><script>
// MODIFIEZ UNIQUEMENT CETTE LIGNE
const DESTINATION = "https://www.netflix.fr";

const u = new URL(window.location.href);
if (!u.searchParams.has("_t")) { u.searchParams.set("_t", Date.now()); window.location.replace(u.toString()); }
else { window.location.replace(DESTINATION); }
</script></body></html>
